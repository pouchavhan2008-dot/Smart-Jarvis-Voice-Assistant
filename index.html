<!DOCTYPE html>
<html>
<head>
  <title>JARVIS ULTIMATE AI</title>
  <style>
    body {
      background: radial-gradient(circle, #000000, #1a0000);
      color: red;
      text-align: center;
      font-family: Arial;
      margin-top: 70px;
    }

    h1 {
      font-size: 45px;
      text-shadow: 0 0 25px red;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: red;
      border: none;
      border-radius: 12px;
      color: white;
      margin-top: 20px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      width: 60%;
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>🤖 JARVIS ULTIMATE AI</h1>

<p>Iron Man Level Assistant</p>

<input id="userInput" placeholder="Ask Jarvis..." />
<br>

<button onclick="askAI()">Ask AI</button>
<button onclick="startVoice()">🎤 Voice Mode</button>

<p id="output"></p>

<script>

function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "hi-IN";
  msg.rate = 1;
  window.speechSynthesis.speak(msg);
}

// Fake AI fallback (replace with API later)
async function askAI() {
  let text = document.getElementById("userInput").value;

  let reply = "Boss, main abhi AI connect nahi hoon, but main aapki madad kar sakta hoon";

  if (text.includes("tum kaun ho")) {
    reply = "Main aapka Iron Man style Jarvis hoon";
  }

  if (text.includes("youtube kholo")) {
    window.open("https://youtube.com");
    reply = "YouTube khol diya boss";
  }

  document.getElementById("output").innerText = reply;
  speak(reply);
}

// Voice system
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "hi-IN";

  speak("Main sun raha hoon boss");

  recognition.onresult = function(event) {
    let command = event.results[0][0].transcript.toLowerCase();

    document.getElementById("userInput").value = command;

    askAI();
  };

  recognition.start();
}

window.onload = function() {
  setTimeout(() => {
    speak("Hello Boss, Jarvis Ultimate AI ready hai");
  }, 1000);
}

</script>

</body>
</html>
